parallel-jobs = 1
compression-level = 9
enable-magisk-update = true
remove-rv-integrations-checks = true

rv-brand = "by h1toru"

cli-source = "j-hc/revanced-cli"
cli-version = "latest"

patches-source = "revanced/revanced-patches"
patches-version = "dev"

# cli-source = "j-hc/revanced-cli"
# cli-source = "inotia00/revanced-cli"

# patches-source = "revanced/revanced-patches"
# patches-source = "inotia00/revanced-patches"
# patches-source = "anddea/revanced-patches"

# https://github.com/MANCrimSon/YouTube-ReVanced-Extended
# https://github.com/NoName-exe/revanced-extended

#========== YouTube ==========#

[YouTube-Premium-Split]
enabled = false
app-name = "YouTube Premium"
# rv-brand = "Extended"
build-mode = "apk"
version = "auto"
arch = "both"
riplib = true
module-prop-name = "h1toru-rvm-yt"

# patches-source = "anddea/revanced-patches"
patcher-args = """\
  -e 'Change version code' \
  -e 'Custom branding name for YouTube' -OappName='YouTube Premium' \
  -d 'Custom branding icon for YouTube' \
  -e 'GmsCore support' -OpackageNameYouTube='h1toru.rvb.yt' \
  -e 'Settings for YouTube' -OrvxSettingsLabel='Extended' \
  -e 'Return YouTube Username' \
  -d 'Enable gradient loading screen' \
  -d 'Alternative thumbnails' \
  -d 'Enable debug logging' \
  """

apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[YouTube-Premium]
enabled = true
app-name = "YouTube Premium"
# rv-brand = "Extended"
build-mode = "both"
version = "auto"
arch = "all"
riplib = false
module-prop-name = "h1toru-rvm-yt"

patches-source = "anddea/revanced-patches"
patches-version = "dev"

patcher-args = """\
  --rip-lib x86_64 --rip-lib x86 --rip-lib arm64-v8a \
  -e 'Change version code' \
  -e 'Custom branding name for YouTube' -OappName='YouTube Premium' \
  -d 'Custom branding icon for YouTube' -d 'Custom header for YouTube' \
  -e 'GmsCore support' -OpackageNameYouTube='h1toru.rvm.yt' \
  -e 'Settings for YouTube' -OrvxSettingsLabel='Premium options' \
  -e 'Return YouTube Username' \
  \
  -d 'Custom double tap length' \
  -d 'Enable gradient loading screen' \
  -d 'Alternative thumbnails' \
  -d 'Translations for YouTube' \
  -d 'Enable debug logging' \
  """

apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

