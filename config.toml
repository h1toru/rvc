#========== Spotify ==========#

[Spotify-Patched]
enabled = true
app-name = "Spotify Patched"
# rv-brand = "Patched"
version = "auto"
arch = "all"
riplib = false

# cli-source = "j-hc/revanced-cli"
patcher-args = """\
  --rip-lib 'x86_64' --rip-lib 'x86' --rip-lib 'arm64-v8a' \
  -e 'Spoof client' \
  """

uptodown-dlurl = "https://spotify.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.spotify.music"
